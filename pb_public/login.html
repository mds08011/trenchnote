<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TrenchNote — Sign in</title>

<!--
  TrenchNote sign-in. One time per phone: the token is stored in
  localStorage and rides along on every request until it expires.

  Accounts are created by the admin in the PocketBase admin UI
  (collections → users → new record) — there is no self-signup, on
  purpose. Field crews typically share one "field" account; PMs get
  their own.

  After signing in, the user is sent back to wherever they were headed
  (?next=...), so a scanned QR label still lands on the right asset.
-->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="tn-sync.js"></script>
<script defer src="vendor/alpine.min.js"></script>

<style>
  /* Same field-utility tokens as every other page */
  :root {
    --ink:    #14161a;
    --paper:  #ffffff;
    --steel:  #5b6470;
    --line:   #d8dce1;
    --safety: #ff5a1f;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--paper); color: var(--ink);
    line-height: 1.45;
    max-width: 480px; margin: 0 auto;
    padding: 16px 16px 48px;
  }
  header {
    border-bottom: 3px solid var(--ink);
    padding-bottom: 10px; margin-bottom: 26px;
  }
  .mark { font-weight: 800; letter-spacing: .04em; font-size: 14px; text-transform: uppercase; }
  h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
  .hint { color: var(--steel); font-size: 14px; margin-bottom: 20px; }

  label {
    display: block; font-size: 12px; font-weight: 700;
    color: var(--steel); margin-bottom: 4px;
  }
  input {
    width: 100%; min-height: 56px;
    font: inherit; font-size: 17px;
    padding: 12px; margin-bottom: 14px;
    border: 2px solid var(--ink); border-radius: 0;
    background: var(--paper); color: var(--ink);
  }
  button.go {
    width: 100%; min-height: 60px;
    font: inherit; font-size: 18px; font-weight: 800;
    text-transform: uppercase; letter-spacing: .05em;
    background: var(--safety); color: #fff;
    border: none; cursor: pointer;
  }
  button.go:disabled { background: var(--line); color: var(--steel); cursor: default; }
  button.go:focus-visible, input:focus-visible {
    outline: 3px solid var(--safety); outline-offset: 2px;
  }
  .error { margin-top: 14px; padding: 14px; background: #fdecea; color: #a1160a; font-weight: 600; }
</style>
</head>
<body>

<div x-data="loginPage()">
  <header style="display: flex; justify-content: space-between; align-items: baseline;">
    <span class="mark">TrenchNote</span>
    <a href="https://github.com/mds08011/trenchnote" target="_blank" style="color: var(--safety); font-weight: 700; font-size: 14px; text-decoration: none;">GitHub</a>
  </header>

  <h1>Sign in</h1>
  <p class="hint">
    Once per phone. Use the field account your PM gave you, or your own.
  </p>

  <form @submit.prevent="signIn()">
    <label for="email">Email</label>
    <input id="email" type="email" x-model="email" autocomplete="username" required>

    <label for="password">Password</label>
    <input id="password" type="password" x-model="password" autocomplete="current-password" required>

    <button class="go" :disabled="busy" x-text="busy ? 'Signing in…' : 'Sign in'"></button>
  </form>

  <div class="error" x-show="error" x-text="error"></div>
</div>

<script>
function loginPage() {
  const PB = window.location.origin;

  return {
    email: '',
    password: '',
    busy: false,
    error: '',

    async signIn() {
      this.busy = true;
      this.error = '';
      try {
        // PocketBase password auth: returns { token, record } on success.
        const res = await fetch(`${PB}/api/collections/users/auth-with-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identity: this.email, password: this.password })
        });
        if (!res.ok) {
          this.error = res.status === 400
            ? 'Wrong email or password.'
            : 'Could not sign in (' + res.status + '). Is the server up?';
          return;
        }
        const data = await res.json();
        localStorage.setItem('tn_token', data.token);
        localStorage.setItem('tn_user', JSON.stringify({
          id: data.record.id, email: data.record.email, name: data.record.name || ''
        }));

        // Send the user back where they were headed. Only same-site
        // relative paths are allowed — anything with a scheme or host
        // (e.g. a crafted ?next=https://evil.example) falls back to the
        // dashboard.
        const next = new URLSearchParams(location.search).get('next') || './';
        location.replace(/^[a-z]+:|\/\//i.test(next) ? './' : next);
      } catch (err) {
        this.error = 'Could not reach the server. (' + err.message + ')';
      } finally {
        this.busy = false;
      }
    }
  };
}
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TrenchNote — Material</title>

<!--
  TrenchNote bulk-material page — the counterpart of asset.html for
  tracking_mode=bulk items (pipe supports, fittings, anchor bolts...).
  Opened as:  material.html?id={item_id}

  There is no "current location" column for bulk stock anywhere in the
  database. This page DERIVES stock-on-hand per location by summing the
  movements ledger: quantity moved IN minus quantity moved OUT. If the
  numbers look wrong, the fix is a correcting movement — never editing
  history.

  Three kinds of bulk movement, told apart by which locations are set
  (enforced server-side, see migration 1783468807):
    receive   from empty, to set     — delivery from outside
    transfer  from set,   to set     — between locations
    consume   from set,   to EMPTY   — installed/used; leaves stock but
                                       stays in the ledger forever
  If you want to track WHERE material was installed (not just that it's
  gone), the alternative to consuming is a location like "Installed —
  Northside" and a normal transfer.
-->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="tn-auth.js"></script>
<script src="tn-sync.js"></script>
<script defer src="vendor/alpine.min.js"></script>

<style>
  /* Same field-utility tokens as asset.html — one design, one app. */
  :root {
    --ink:    #14161a;
    --paper:  #ffffff;
    --steel:  #5b6470;
    --line:   #d8dce1;
    --safety: #ff5a1f;
    --go:     #1b8a4b;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--paper); color: var(--ink);
    line-height: 1.45;
    max-width: 480px; margin: 0 auto;
    padding: 16px 16px 48px;
  }

  header {
    display: flex; justify-content: space-between; align-items: baseline;
    border-bottom: 3px solid var(--ink);
    padding-bottom: 10px; margin-bottom: 20px;
  }
  .mark { font-weight: 800; letter-spacing: .04em; font-size: 14px; text-transform: uppercase; }
  header a { color: var(--safety); font-weight: 700; font-size: 14px; text-decoration: none; }

  h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.01em; }
  .meta { color: var(--steel); font-size: 14px; margin-top: 2px; }
  .meta.code span { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-weight: 700; }
  .badge {
    display: inline-block; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .08em;
    padding: 3px 8px; margin-top: 8px;
    border: 1.5px solid currentColor; color: var(--steel);
  }

  /* ---- Stock plate: where the material sits right now ------------- */
  .plate { margin-top: 22px; border: 3px solid var(--ink); }
  .plate .eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: .14em;
    text-transform: uppercase; color: var(--steel);
    padding: 12px 16px 0;
  }
  .stock-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 10px 16px;
    border-bottom: 1px solid var(--line);
  }
  .stock-row:last-child { border-bottom: none; }
  .stock-row .loc { font-weight: 800; text-transform: uppercase; font-size: 17px; }
  .stock-row .qty {
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-weight: 700; font-size: 22px;
  }
  .stock-row.total { border-top: 2px solid var(--ink); }
  .stock-row.total .loc { color: var(--steel); font-size: 13px; letter-spacing: .1em; }
  /* A negative balance is a data error, not information — make it look
     like one. */
  .stock-row.neg .qty, .stock-row.neg .loc { color: #a1160a; }
  .transit-note { margin-top:14px; padding:12px; border:2px solid #8a5a00; background:#fff7e8; color:#6d4700; font-weight:800; }
  .transit-note a { color:inherit; }
  .neg-warn {
    padding: 10px 16px; font-size: 13px; font-weight: 600;
    background: #fdecea; color: #a1160a;
  }
  .empty { color: var(--steel); padding: 14px 16px; font-size: 14px; }

  /* ---- Move form --------------------------------------------------- */
  .move { margin-top: 26px; }
  .move h2 {
    font-size: 12px; font-weight: 700; letter-spacing: .14em;
    text-transform: uppercase; color: var(--steel); margin-bottom: 10px;
  }
  select, input[type=text], input[type=number] {
    width: 100%; min-height: 56px;
    font: inherit; font-size: 17px;
    padding: 12px; margin-bottom: 10px;
    border: 2px solid var(--ink); border-radius: 0;
    background: var(--paper); color: var(--ink);
  }
  .onhand { font-size: 13px; color: var(--steel); margin: -6px 0 10px; }
  button.go {
    width: 100%; min-height: 60px;
    font: inherit; font-size: 18px; font-weight: 800;
    text-transform: uppercase; letter-spacing: .05em;
    background: var(--safety); color: #fff;
    border: none; cursor: pointer;
  }
  button.go:disabled { background: var(--line); color: var(--steel); cursor: default; }
  button.go:focus-visible, select:focus-visible, input:focus-visible {
    outline: 3px solid var(--safety); outline-offset: 2px;
  }

  .flash { margin-top: 14px; padding: 14px; font-weight: 700; color: #fff; background: var(--go); }
  .error { margin-top: 14px; padding: 14px; background: #fdecea; color: #a1160a; font-weight: 600; }
  .loading { color: var(--steel); padding: 40px 0; text-align: center; }

  /* ---- Receiving log (ADR 0013) ------------------------------------
     Delivery-only fields: vendor, PO, packing-slip photo, OS&D note.
     Photo buttons are the same glove-sized .cam as asset.html. */
  .photo-row { display: flex; gap: 10px; }
  .photo-row .cam {
    flex: 1; min-height: 56px; margin-bottom: 10px;
    font: inherit; font-size: 15px; font-weight: 700;
    background: var(--paper); border: 2px solid var(--ink);
    cursor: pointer; color: var(--ink);
  }
  .photo-row .cam.has { border-color: var(--go); color: var(--go); }
  /* The nag: loud amber, never a wall. A delivery without a slip photo
     still beats a delivery that never got logged. */
  .nag {
    margin: 4px 0 10px; padding: 12px;
    background: #fff4e5; color: #8a5a00; border: 2px solid #8a5a00;
    font-weight: 700; font-size: 14px;
  }

  /* ---- Delivery history -------------------------------------------- */
  .dlv-row {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 12px 16px; border-bottom: 1px solid var(--line);
  }
  .dlv-row:last-child { border-bottom: none; }
  .dlv-thumb {
    flex: 0 0 56px; width: 56px; height: 56px; object-fit: cover;
    border: 2px solid var(--ink); display: block;
  }
  .dlv-noslip {
    flex: 0 0 56px; width: 56px; height: 56px;
    display: flex; align-items: center; justify-content: center;
    border: 2px dashed var(--line); color: var(--steel);
    font-size: 10px; font-weight: 700; text-align: center;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .dlv-body { flex: 1; min-width: 0; font-size: 14px; }
  .dlv-head { font-weight: 800; }
  .dlv-meta { color: var(--steel); }
  .dlv-osd { color: #8a5a00; font-weight: 600; }
  .dlv-body a { color: var(--safety); font-weight: 700; }
  .report-link {
    display: block; margin-top: 12px;
    color: var(--safety); font-weight: 700; font-size: 14px;
  }
</style>
</head>
<body>

<div x-data="materialPage()" x-init="load()">

  <header>
    <span class="mark">TrenchNote</span>
    <span>
      <a href="https://github.com/mds08011/trenchnote" target="_blank">GitHub</a>
      &nbsp;·&nbsp;
      <a href="scan.html">📷 Scan</a> &nbsp;·&nbsp; <a href="./">Dashboard</a>
    </span>
  </header>

  <template x-if="state === 'loading'">
    <p class="loading">Loading material…</p>
  </template>

  <template x-if="state === 'error'">
    <div class="error" x-text="errorMsg"></div>
  </template>

  <template x-if="state === 'ready'">
    <main>
      <h1 x-text="item.name"></h1>
      <p class="meta" x-show="item.category" x-text="item.category"></p>
      <!-- Office reference number (ADR 0018), monospace like tag codes -->
      <p class="meta code" x-show="item.item_code">
        Item #<span x-text="item.item_code"></span>
      </p>
      <span class="badge">Bulk material</span>

      <!-- Manifest-derived transit (ADR 0020). These counts remain part of
           source ledger stock until the receiver confirms the truck. -->
      <template x-for="line in manifestLines" :key="line.id">
        <div class="transit-note">
          <span x-text="line.sent_quantity + ' in transit on '"></span>
          <a :href="'manifest.html?id=' + line.manifest"
             x-text="'Manifest #' + line.manifest.slice(0,6).toUpperCase()"></a>
          <span x-text="' · ' + (line.expand?.manifest?.expand?.from_location?.name || '?') +
            ' → ' + (line.expand?.manifest?.expand?.to_location?.name || '?')"></span>
        </div>
      </template>

      <!-- Stock on hand, derived from the ledger on every load -->
      <div class="plate">
        <div class="eyebrow">Stock on hand</div>
        <template x-for="s in stock" :key="s.id">
          <div class="stock-row" :class="{ neg: s.qty < 0 }">
            <span class="loc" x-text="(s.qty < 0 ? '⚠ ' : '') + s.name"></span>
            <span class="qty" x-text="s.qty"></span>
          </div>
        </template>
        <div class="empty" x-show="!stock.length">
          Nothing on hand — log a delivery below.
        </div>
        <div class="stock-row total" x-show="stock.length">
          <span class="loc">TOTAL</span>
          <span class="qty" x-text="total"></span>
        </div>
        <div class="neg-warn" x-show="hasNegative">
          ⚠ A negative count means the ledger and the ground disagree —
          more left this spot on paper than ever arrived. Fix it with a
          correcting move (usually a delivery that was never logged).
        </div>
      </div>

      <!-- Move / receive form -->
      <div class="move">
        <h2>Move material</h2>

        <select x-model="fromLoc" aria-label="From">
          <option value="">New delivery (from outside)</option>
          <template x-for="loc in locations" :key="loc.id">
            <option :value="loc.id" x-text="'From: ' + loc.name"></option>
          </template>
        </select>
        <!-- Show what the ledger says is at the chosen source, so a crew
             moving "more than exists" notices the count has drifted -->
        <p class="onhand" x-show="fromLoc"
           x-text="'On hand there per ledger: ' + (stockAt(fromLoc) || 0)"></p>

        <select x-model="toLoc" aria-label="To">
          <option value="" disabled selected>To…</option>
          <template x-for="loc in locations.filter(l => l.id !== fromLoc)" :key="loc.id">
            <option :value="loc.id" x-text="loc.name"></option>
          </template>
          <!-- Consume: leaves stock without landing anywhere. Only makes
               sense when taking FROM somewhere. -->
          <option value="@consumed" x-show="fromLoc">Used / consumed (leaves stock)</option>
        </select>
        <p class="onhand" x-show="toLoc === '@consumed' && !fromLoc">
          Pick where it's being used from first.
        </p>

        <input type="number" x-model.number="qty" min="1" step="1" placeholder="Quantity">

        <!-- Receiving log (ADR 0013): dispute evidence, deliveries only.
             The first dropdown on "New delivery" means material arriving
             from outside — the moment the packing slip is in your hand. -->
        <template x-if="isDelivery">
          <div>
            <input type="text" x-model="vendor" placeholder="Vendor — who delivered (optional)">
            <input type="text" x-model="po" placeholder="PO number (optional)">

            <div class="photo-row">
              <button type="button" class="cam" :class="{ has: slipPhoto }"
                      @click="$refs.slipInput.click()"
                      x-text="slipPhoto ? '📷 ✓ Packing slip attached' : '📷 Packing slip photo'"></button>
              <input type="file" accept="image/*" capture="environment" hidden
                     x-ref="slipInput"
                     @change="slipPhoto = $event.target.files[0] || null">
            </div>
            <!-- Nag loudly, never block: a delivery logged without a photo
                 still beats a delivery not logged. -->
            <div class="nag" x-show="!slipPhoto">
              ⚠ No packing slip photo — this delivery will be hard to prove
              later. Snap the slip before the driver leaves.
            </div>

            <input type="text" x-model="osd"
                   placeholder="Over / short / damaged? e.g. “480 of 500 per slip, 2 crates damaged”">

            <div class="photo-row">
              <button type="button" class="cam" :class="{ has: extraPhotos.length }"
                      @click="$refs.extraInput.click()"
                      x-text="extraPhotos.length ? ('📷 ✓ ' + extraPhotos.length + ' damage photo' + (extraPhotos.length === 1 ? '' : 's')) : '📷 Damage photos (optional)'"></button>
              <input type="file" accept="image/*" capture="environment" multiple hidden
                     x-ref="extraInput"
                     @change="extraPhotos = Array.from($event.target.files)">
            </div>
          </div>
        </template>

        <input type="text" x-model="note" placeholder="Note — slip #, where installed (optional)">
        <input type="text" x-model="movedBy" placeholder="Your name (optional)">

        <button class="go" :disabled="!canSubmit || busy" @click="move()"
                x-text="busy ? 'Saving…' : 'Log move'"></button>

        <div class="flash" x-show="flash" x-text="flash"></div>
        <div class="error" x-show="moveError" x-text="moveError"></div>
      </div>

      <!-- Delivery history: the receiving log, straight from the ledger.
           Every receive-shaped movement of this item, newest first, with
           its evidence (slip thumbnail, OS&D note). -->
      <div class="plate" style="margin-top: 26px" x-show="deliveries.length">
        <div class="eyebrow">Delivery history</div>
        <template x-for="d in deliveries" :key="d.id || d.created">
          <div class="dlv-row">
            <a x-show="d.packing_slip" :href="slipUrl(d)" target="_blank">
              <img class="dlv-thumb" :src="slipUrl(d, true)" alt="Packing slip">
            </a>
            <div class="dlv-noslip" x-show="!d.packing_slip">no slip photo</div>
            <div class="dlv-body">
              <div class="dlv-head"
                   x-text="d.quantity + ' → ' + locName(d.to_location)"></div>
              <div class="dlv-meta"
                   x-text="fmtDate(d.created)
                           + (d.vendor_name ? ' · ' + d.vendor_name : '')
                           + (d.po_number ? ' · PO ' + d.po_number : '')
                           + (d.moved_by ? ' · ' + d.moved_by : '')"></div>
              <div class="dlv-osd" x-show="d.osd_note" x-text="'⚠ ' + d.osd_note"></div>
              <div x-show="(d.photos || []).length">
                <template x-for="(p, i) in (d.photos || [])" :key="p">
                  <a :href="photoUrl(d, p)" target="_blank" x-text="'photo ' + (i + 1) + ' '"></a>
                </template>
              </div>
            </div>
          </div>
        </template>
      </div>
      <a class="report-link" :href="'receiving.html?item=' + id" x-show="deliveries.length">
        🖨 Receiving report (print / vendor dispute) →
      </a>
    </main>
  </template>

</div>

<script>
TN.requireLogin();

function materialPage() {
  const PB = window.location.origin;   // PocketBase serves this page — same origin

  return {
    id: new URLSearchParams(location.search).get('id') || '',
    state: 'loading',
    errorMsg: '',
    item: null,
    locations: [],
    movements: [],
    manifestLines: [],
    fromLoc: '',
    toLoc: '',
    qty: null,
    note: '',
    movedBy: localStorage.getItem('tn_name') || '',
    // Receiving log (ADR 0013) — delivery-only evidence fields
    vendor: '',
    po: '',
    osd: '',
    slipPhoto: null,
    extraPhotos: [],
    busy: false,
    flash: '',
    moveError: '',

    // Net quantity per location: sum of moves in, minus moves out.
    // Consumed movements have no to_location, so they subtract from the
    // source and add nowhere — that's how stock leaves the system.
    // Only locations with a non-zero balance are shown.
    get stock() {
      const net = {};
      for (const m of this.movements) {
        if (m.to_location) {
          net[m.to_location] = (net[m.to_location] || 0) + m.quantity;
        }
        if (m.from_location) {
          net[m.from_location] = (net[m.from_location] || 0) - m.quantity;
        }
      }
      return this.locations
        .map(l => ({ id: l.id, name: l.name, qty: net[l.id] || 0 }))
        .filter(s => s.qty !== 0)
        .sort((a, b) => b.qty - a.qty);
    },

    get total() {
      return this.stock.reduce((sum, s) => sum + s.qty, 0);
    },

    get hasNegative() {
      return this.stock.some(s => s.qty < 0);
    },

    // Consuming requires a source; everything else just needs a
    // destination and a quantity.
    get canSubmit() {
      if (!(this.qty > 0) || !this.toLoc) return false;
      if (this.toLoc === '@consumed' && !this.fromLoc) return false;
      return true;
    },

    // "New delivery" mode = the receiving-log fields apply (ADR 0013).
    // A delivery is a receive-shaped movement: no from_location.
    get isDelivery() {
      return !this.fromLoc && this.toLoc !== '@consumed';
    },

    // The receiving log, straight from the already-loaded ledger:
    // receive-shaped movements (to set, from empty) of this item,
    // newest first (the fetch sorts -created).
    get deliveries() {
      return this.movements.filter(m => m.to_location && !m.from_location);
    },

    stockAt(locId) {
      const s = this.stock.find(s => s.id === locId);
      return s ? s.qty : 0;
    },

    locName(locId) {
      const l = this.locations.find(l => l.id === locId);
      return l ? l.name : '?';
    },

    fmtDate(iso) {
      return iso ? new Date(iso).toLocaleDateString() : 'queued on this phone';
    },

    // PocketBase file URL pattern: /api/files/{collection}/{recordId}/{filename}
    // ?thumb asks the server for a small crop — kilobytes, not the full shot.
    slipUrl(m, thumb) {
      return `${PB}/api/files/movements/${m.id}/${m.packing_slip}` +
             (thumb ? '?thumb=100x100' : '');
    },

    photoUrl(m, filename) {
      return `${PB}/api/files/movements/${m.id}/${filename}`;
    },

    async load() {
      if (!this.id) {
        this.state = 'error';
        this.errorMsg = 'No material id in the URL. Open this page as material.html?id=…';
        return;
      }
      try {
        const mfFilter = encodeURIComponent(`item='${this.id}' && manifest.status='in_transit'`);
        const [itemRes, locRes, mvRes, mfRes] = await Promise.all([
          TN.fetch(`${PB}/api/collections/items/records/${this.id}`),
          TN.fetch(`${PB}/api/collections/locations/records?sort=name&perPage=200`),
          // Every bulk movement of THIS item. perPage caps at 500 — plenty
          // for years of a single material; revisit with paging if a ledger
          // ever outgrows it.
          TN.fetch(`${PB}/api/collections/movements/records?filter=(item='${this.id}')&sort=-created&perPage=500`),
          TN.fetch(`${PB}/api/collections/manifest_lines/records?filter=(${mfFilter})&sort=created&perPage=100&expand=manifest.from_location,manifest.to_location`),
        ]);
        if (!itemRes.ok || !mfRes.ok) throw new Error('material not found (' + (itemRes.ok ? mfRes.status : itemRes.status) + ')');
        this.item = await itemRes.json();
        this.locations = (await locRes.json()).items;
        this.movements = (await mvRes.json()).items;
        this.manifestLines = (await mfRes.json()).items;
        this.state = 'ready';
      } catch (err) {
        this.state = 'error';
        this.errorMsg = 'Could not load. Is PocketBase running? (' + err.message + ')';
      }
    },

    async move() {
      // Soft guard, not a wall: taking more from a spot than the ledger
      // says is there is *sometimes* right (the ledger is missing a
      // delivery) and sometimes a fat-fingered quantity. Confirm once,
      // then trust the crew — they're standing next to the material.
      if (this.fromLoc && this.qty > this.stockAt(this.fromLoc)) {
        const src = this.locations.find(l => l.id === this.fromLoc);
        const ok = confirm(
          'The ledger says ' + (src ? src.name : 'that spot') + ' only has ' +
          this.stockAt(this.fromLoc) + ', but you\'re logging ' + this.qty + '.\n\n' +
          'Log it anyway? The count there will go negative until the ' +
          'missing delivery gets logged.'
        );
        if (!ok) return;
      }
      this.busy = true;
      this.flash = '';
      this.moveError = '';
      if (this.movedBy) localStorage.setItem('tn_name', this.movedBy);

      // Built once with a pre-generated id so the identical record can be
      // sent now or replayed from the offline queue without duplicating
      // (ADR 0008). "@consumed" is a UI sentinel — the ledger just gets
      // an empty to_location, which is what "consumed" means server-side.
      const consuming = this.toLoc === '@consumed';
      const dest = this.locations.find(l => l.id === this.toLoc);
      const movement = {
        id: TNSync.genId(),
        item: this.id,
        quantity: this.qty,
        from_location: this.fromLoc || null,
        to_location: consuming ? null : this.toLoc,
        moved_by: this.movedBy || 'unspecified',
        note: this.note || ''
      };
      // Receiving log (ADR 0013): dispute evidence rides on the delivery
      // itself. Transfers and consumes never carry these.
      const files = { packing_slip: null, photos: [] };
      if (this.isDelivery) {
        movement.vendor_name = this.vendor || '';
        movement.po_number = this.po || '';
        movement.osd_note = this.osd || '';
        // Spread, don't assign: extraPhotos is an Alpine reactive Proxy,
        // and IndexedDB's structured clone can't serialize proxies — an
        // offline enqueue would throw DataCloneError. The Files inside
        // are untouched by Alpine (it only proxies plain objects/arrays).
        files.packing_slip = this.slipPhoto;
        files.photos = [...this.extraPhotos];
      }
      const hasFiles = !!(files.packing_slip || files.photos.length);
      const doneMsg = consuming
        ? '✓ ' + this.qty + ' used'
        : '✓ ' + this.qty + ' → ' + (dest ? dest.name : 'destination');

      const clearForm = () => {
        this.qty = null;
        this.toLoc = '';
        this.note = '';
        this.vendor = '';
        this.po = '';
        this.osd = '';
        this.slipPhoto = null;
        this.extraPhotos = [];
      };

      try {
        // One POST, no cache to update afterwards: bulk stock is always
        // derived from the ledger, so the ledger entry IS the whole move.
        // Deliveries with photos go as multipart (the only way files
        // travel over HTTP); everything else stays JSON. In multipart,
        // null fields are SKIPPED — FormData would send the text "null".
        let res;
        if (hasFiles) {
          const fd = new FormData();
          for (const k in movement) {
            if (movement[k] !== null && movement[k] !== undefined) fd.append(k, movement[k]);
          }
          if (files.packing_slip) fd.append('packing_slip', files.packing_slip, 'slip.jpg');
          for (const p of files.photos) fd.append('photos', p, 'photo.jpg');
          res = await TN.fetch(`${PB}/api/collections/movements/records`, {
            method: 'POST',
            body: fd
          });
        } else {
          res = await TN.fetch(`${PB}/api/collections/movements/records`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(movement)
          });
        }
        if (!res.ok) throw new Error('movement rejected (' + res.status + ')');

        this.flash = doneMsg;
        clearForm();
        await this.load();   // re-derive the stock plate
      } catch (err) {
        if (TNSync.isNetworkError(err)) {
          // No signal: queue it (photos ride along as Blobs — ADR 0013),
          // and fold the movement into the local list so the stock plate
          // re-derives optimistically — sums are order-independent, so
          // the math is the same one the server will reach after sync.
          await TNSync.enqueue(movement, null,
            this.qty + '× ' + this.item.name + (consuming ? ' used' : ' → ' + (dest ? dest.name : '?')),
            hasFiles ? files : null);
          this.movements.unshift({
            id: movement.id,   // the pre-generated id — stable render key
            to_location: movement.to_location || '',
            from_location: movement.from_location || '',
            quantity: movement.quantity,
            vendor_name: movement.vendor_name || '',
            po_number: movement.po_number || '',
            osd_note: movement.osd_note || '',
            moved_by: movement.moved_by
            // no `created`, no `packing_slip`: the delivery-history row
            // shows "queued on this phone" and the no-photo placeholder
            // until the real record syncs.
          });
          this.flash = doneMsg + ' — saved on this phone, will sync';
          clearForm();
        } else {
          this.moveError = 'Move failed: ' + err.message;
        }
      } finally {
        this.busy = false;
      }
    }
  };
}
</script>
</body>
</html>

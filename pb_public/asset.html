<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TrenchNote — Asset</title>

<!--
  TrenchNote asset page — the page a QR label opens.
  The QR encodes:  {baseUrl}/asset.html?code=A001

  PocketBase serves this file from pb_public/ at the same origin as its API,
  so the page talks to window.location.origin — no configuration, and the
  same file works on localhost, a LAN IP, or a real domain.

  Alpine.js is vendored locally (see vendor/README.md) — zero external
  requests at runtime.

  Auth: every API call goes through TN.fetch (tn-auth.js), which attaches
  the token saved by login.html. No token = redirected to sign in, then
  bounced back here so the scanned QR still lands on the right asset.
-->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="tn-auth.js"></script>
<script src="tn-sync.js"></script>
<script src="tn-inspect.js"></script>
<script defer src="vendor/alpine.min.js"></script>

<style>
  /* ---- Field-utility design tokens -------------------------------
     High contrast for direct sunlight. System fonts = zero webfont
     bytes. Tap targets sized for gloved hands. One accent: safety
     orange, spent only on the primary action. */
  :root {
    --ink:    #14161a;   /* near-black text */
    --paper:  #ffffff;
    --steel:  #5b6470;   /* secondary text */
    --line:   #d8dce1;
    --safety: #ff5a1f;   /* the one accent */
    --go:     #1b8a4b;   /* confirmation */
    --rent:   #8a5a00;   /* rented badge */
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.45;
    max-width: 480px;
    margin: 0 auto;
    padding: 16px 16px 48px;
  }

  /* Top bar: app mark + tag code, like a stamped equipment plate */
  header {
    display: flex; justify-content: space-between; align-items: baseline;
    border-bottom: 3px solid var(--ink);
    padding-bottom: 10px; margin-bottom: 20px;
  }
  .mark { font-weight: 800; letter-spacing: .04em; font-size: 14px; text-transform: uppercase; }
  .tag  {
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-weight: 700; font-size: 20px;
    border: 2px solid var(--ink); padding: 1px 8px;
  }

  h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.01em; }
  .meta { color: var(--steel); font-size: 14px; margin-top: 2px; }

  .badge {
    display: inline-block; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .08em;
    padding: 3px 8px; margin-top: 8px;
    border: 1.5px solid currentColor;
  }
  .badge.rented { color: var(--rent); }
  .badge.owned  { color: var(--steel); }

  img.photo {
    width: 100%; margin-top: 14px;
    border: 1px solid var(--line);
  }

  /* ---- Signature element: the location plate ---------------------
     The answer to "where is it" reads like a stenciled gate sign. */
  .plate {
    margin-top: 22px;
    border: 3px solid var(--ink);
    padding: 16px;
  }
  .plate .eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: .14em;
    text-transform: uppercase; color: var(--steel);
  }
  .plate .loc {
    font-size: 34px; font-weight: 800; letter-spacing: -0.01em;
    text-transform: uppercase; line-height: 1.1; margin-top: 4px;
  }
  .plate .dur { margin-top: 8px; font-size: 14px; color: var(--steel); }
  .plate .dur strong { color: var(--ink); }

  /* ---- Move form -------------------------------------------------- */
  .move { margin-top: 26px; }
  .move h2 {
    font-size: 12px; font-weight: 700; letter-spacing: .14em;
    text-transform: uppercase; color: var(--steel); margin-bottom: 10px;
  }
  select, input[type=text], input[type=number] {
    width: 100%; min-height: 56px;
    font: inherit; font-size: 17px;
    padding: 12px; margin-bottom: 10px;
    border: 2px solid var(--ink); border-radius: 0;
    background: var(--paper); color: var(--ink);
  }

  /* ---- Meter reading capture (ADR 0012) ---------------------------
     One optional row in the move flow, glove-sized: numeric input +
     a camera button for the gauge photo. Skippable at zero cost. */
  .meter-row { display: flex; gap: 10px; }
  .meter-row input { flex: 1; }
  .meter-row .cam {
    flex: 0 0 56px; min-height: 56px; margin-bottom: 10px;
    font-size: 22px; line-height: 1;
    background: var(--paper); border: 2px solid var(--ink);
    cursor: pointer; color: var(--ink);
  }
  .meter-row .cam.has { border-color: var(--go); color: var(--go); }
  /* Amber, not red: a lower-than-previous reading is a heads-up
     (replaced meter or a typo to correct), never a block. */
  .warn {
    margin-top: 14px; padding: 14px;
    background: #fff4e5; color: #8a5a00; border: 2px solid #8a5a00;
    font-weight: 600; font-size: 14px;
  }
  .meter { margin-top: 26px; }
  .meter h2 {
    font-size: 12px; font-weight: 700; letter-spacing: .14em;
    text-transform: uppercase; color: var(--steel); margin-bottom: 10px;
  }
  .rdg {
    display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
    padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 14px;
  }
  .rdg .val {
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-weight: 700; font-size: 16px;
  }
  .rdg .who { color: var(--steel); font-size: 13px; }
  .rdg .low {
    color: #8a5a00; border: 1.5px solid currentColor;
    font-size: 10px; font-weight: 700; letter-spacing: .08em;
    padding: 0 4px; text-transform: uppercase;
  }
  .rdg a { color: var(--safety); font-size: 13px; }

  /* ---- Inspections (ADR 0014) --------------------------------------
     The compliance badge. RED outranks everything on this page — gear
     you must not use has no business leading with a move button — so
     the red banner renders ABOVE the location plate. All three colors
     are the same tappable banner opening the same panel. */
  .insp-banner {
    margin-top: 22px; border: 3px solid; padding: 14px 16px;
    cursor: pointer;
  }
  .insp-banner .headline {
    font-size: 22px; font-weight: 800;
    text-transform: uppercase; letter-spacing: .01em;
  }
  .insp-banner .why { font-weight: 600; font-size: 14px; margin-top: 4px; }
  .insp-banner .tap {
    font-size: 12px; font-weight: 700; margin-top: 8px;
    text-decoration: underline;
  }
  .insp-banner.red    { border-color: #a1160a; background: #fdecea; color: #a1160a; }
  .insp-banner.yellow { border-color: #8a5a00; background: #fff4e5; color: #8a5a00; margin-top: 14px; }
  .insp-banner.yellow .headline { font-size: 16px; }
  .insp-banner.green  { border-color: var(--go); color: var(--go); margin-top: 14px; padding: 10px 16px; }
  .insp-banner.green .headline { font-size: 14px; }
  .insp { margin-top: 26px; }
  .insp h2 {
    font-size: 12px; font-weight: 700; letter-spacing: .14em;
    text-transform: uppercase; color: var(--steel); margin: 14px 0 10px;
  }
  .insp-row {
    padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 14px;
  }
  .insp-row .who { color: var(--steel); font-size: 13px; margin-top: 1px; }
  .chip {
    font-size: 10px; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; border: 1.5px solid currentColor;
    padding: 0 4px; margin-left: 6px; white-space: nowrap;
  }
  .chip.red   { color: #a1160a; }
  .chip.amber { color: #8a5a00; }
  .chip.ok    { color: var(--go); }
  .res-pass { color: var(--go); }
  .res-fail, .res-removed_from_service { color: #a1160a; }

  button.go {
    width: 100%; min-height: 60px;
    font: inherit; font-size: 18px; font-weight: 800;
    text-transform: uppercase; letter-spacing: .05em;
    background: var(--safety); color: #fff;
    border: none; cursor: pointer;
  }
  button.go:disabled { background: var(--line); color: var(--steel); cursor: default; }
  button.go:focus-visible, select:focus-visible, input:focus-visible {
    outline: 3px solid var(--safety); outline-offset: 2px;
  }

  /* ---- Reservations ------------------------------------------------ */
  .resv-note {
    margin-top: 14px; padding: 10px 12px;
    border: 2px solid var(--rent); color: var(--rent);
    font-size: 14px; font-weight: 600;
  }
  .resv-note strong { text-transform: uppercase; letter-spacing: .06em; font-size: 12px; }
  /* An open claim whose release date has passed is an unresolved
     question — flag it, never hide it. */
  .resv-note.expired { border-color: #a1160a; color: #a1160a; }
  .resv-cancel {
    display: block; margin-top: 6px;
    background: none; border: none; padding: 0; cursor: pointer;
    font: inherit; font-size: 12px; font-weight: 700;
    color: inherit; text-decoration: underline;
  }
  /* Post-move fulfill offer */
  .fulfill {
    margin-top: 14px; padding: 12px;
    border: 2px solid var(--go); font-size: 14px;
  }
  .fulfill p { font-weight: 700; margin-bottom: 8px; }
  .fulfill button {
    display: block; width: 100%; min-height: 48px;
    margin-top: 6px; padding: 8px 12px;
    font: inherit; font-size: 14px; font-weight: 700;
    background: var(--paper); color: var(--go);
    border: 2px solid var(--go); cursor: pointer; text-align: left;
  }
  .resv { margin-top: 26px; }
  .resv h2 {
    font-size: 12px; font-weight: 700; letter-spacing: .14em;
    text-transform: uppercase; color: var(--steel); margin-bottom: 10px;
  }
  .resv-toggle {
    background: none; border: none; cursor: pointer;
    font: inherit; font-size: 14px; font-weight: 700;
    color: var(--steel); text-decoration: underline; padding: 0;
  }
  input[type=date] {
    width: 100%; min-height: 56px;
    font: inherit; font-size: 17px;
    padding: 12px; margin-bottom: 10px;
    border: 2px solid var(--ink); border-radius: 0;
    background: var(--paper); color: var(--ink);
  }
  .field-label {
    display: block; font-size: 12px; font-weight: 700;
    color: var(--steel); margin-bottom: 4px;
  }
  button.go.secondary { background: var(--ink); }

  .flash {
    margin-top: 14px; padding: 14px;
    font-weight: 700; color: #fff; background: var(--go);
  }
  .error { margin-top: 14px; padding: 14px; background: #fdecea; color: #a1160a; font-weight: 600; }
  .loading { color: var(--steel); padding: 40px 0; text-align: center; }
</style>
</head>
<body>

<div x-data="assetPage()" x-init="load()">

  <header>
    <span class="mark">TrenchNote</span>
    <span style="display: flex; align-items: center; gap: 12px;">
      <a href="https://github.com/mds08011/trenchnote" target="_blank" style="color: var(--safety); font-weight: 700; font-size: 14px; text-decoration: none;">GitHub</a>
      <span class="tag" x-text="code || '—'"></span>
    </span>
  </header>

  <template x-if="state === 'loading'">
    <p class="loading">Loading asset…</p>
  </template>

  <template x-if="state === 'error'">
    <div class="error" x-text="errorMsg"></div>
  </template>

  <template x-if="state === 'ready'">
    <main>
      <h1 x-text="asset.expand?.item?.name || 'Unknown item'"></h1>
      <p class="meta" x-show="asset.serial_number">
        Serial: <span x-text="asset.serial_number"></span>
      </p>
      <!-- Custodianship (ADR 0012): trucks/vehicles belong to a person -->
      <p class="meta" x-show="asset.assigned_to">
        Assigned to: <span x-text="asset.assigned_to"></span>
      </p>
      <span class="badge"
            :class="asset.ownership === 'rented' ? 'rented' : 'owned'"
            x-text="asset.ownership === 'rented'
                    ? ('RENTED — ' + (asset.vendor || 'vendor n/a'))
                    : 'COMPANY OWNED'"></span>

      <template x-if="photoUrl">
        <img class="photo" :src="photoUrl" alt="Asset photo">
      </template>

      <!-- Compliance badge, RED tier (ADR 0014): renders ABOVE the
           location plate — "do not use" outranks "where is it". The
           verdict is DERIVED fresh on every load by tn-inspect.js from
           the requirements + inspections ledger; nothing is stored. -->
      <template x-if="insp.badge === 'red'">
        <div class="insp-banner red" role="button"
             @click="showInsp = !showInsp">
          <div class="headline">🚫 Do not use</div>
          <template x-for="reason in insp.reasons">
            <div class="why" x-text="reason"></div>
          </template>
          <div class="tap" x-text="showInsp ? 'Hide inspections ▲' : 'Inspections & history ▼'"></div>
        </div>
      </template>

      <!-- The location plate -->
      <div class="plate">
        <div class="eyebrow">Current location</div>
        <div class="loc" x-text="asset.expand?.current_location?.name || 'UNASSIGNED'"></div>
        <div class="dur" x-show="daysHere !== null">
          Here for <strong x-text="daysHere === 0 ? 'less than a day' : daysHere + (daysHere === 1 ? ' day' : ' days')"></strong>
        </div>
        <!-- Current job is DERIVED: the current location's job_code
             (ADR 0012). No stored copy to drift. -->
        <div class="dur" x-show="asset.expand?.current_location?.job_code">
          Charging to job <strong x-text="asset.expand?.current_location?.job_code"></strong>
        </div>
      </div>

      <!-- Compliance badge, YELLOW/GREEN tiers, plus the quiet link for
           assets with no requirements (most of them). Same panel. -->
      <template x-if="insp.badge === 'yellow' || insp.badge === 'green'">
        <div class="insp-banner" :class="insp.badge" role="button"
             @click="showInsp = !showInsp">
          <div class="headline"
               x-text="insp.badge === 'yellow' ? '⚠ Inspection due soon' : '✓ Inspections current'"></div>
          <template x-for="row in insp.rows.filter(r => r.state === 'due_soon')">
            <div class="why" x-text="row.req.name + ' — ' + row.label"></div>
          </template>
          <div class="tap" x-text="showInsp ? 'Hide inspections ▲' : 'Inspections & history ▼'"></div>
        </div>
      </template>
      <template x-if="insp.badge === 'none'">
        <div style="margin-top:14px">
          <button class="resv-toggle" @click="showInsp = !showInsp"
                  x-text="showInsp ? 'Hide inspections ▲' : '🛡 Inspections & certs →'"></button>
        </div>
      </template>

      <!-- Inspections panel (ADR 0014): per-requirement status, the log
           form (offline-safe like moves), the append-only history, and
           requirement management. -->
      <template x-if="showInsp">
        <div class="insp">
          <h2 x-show="insp.rows.length" style="margin-top:0">Requirements</h2>
          <template x-for="row in insp.rows" :key="row.req.id">
            <div class="insp-row">
              <div>
                <strong x-text="row.req.name"></strong>
                <span class="chip" :class="chipClass(row.state)" x-text="row.label"></span>
              </div>
              <div class="who">
                every <span x-text="row.req.interval_days"></span> days<span
                  x-show="row.req.reference" x-text="' · ' + row.req.reference"></span><span
                  x-show="row.lastPass" x-text="' · last passed ' + fmtIDay(row.lastPass.inspected_at)"></span>
              </div>
            </div>
          </template>
          <p class="meta" x-show="!requirements.length">
            No inspection requirements on this asset. Log a one-off check
            below, or add a requirement under “Manage requirements”.
          </p>

          <h2>Log an inspection</h2>
          <select x-model="inspReq" aria-label="Which requirement">
            <option value="">Ad-hoc — no scheduled requirement</option>
            <template x-for="r in requirements" :key="r.id">
              <option :value="r.id" x-text="r.name"></option>
            </template>
          </select>
          <select x-model="inspResult" aria-label="Result">
            <option value="" disabled selected>Result…</option>
            <option value="pass">✓ Pass</option>
            <option value="fail">✗ Fail</option>
            <option value="removed_from_service">🚫 Removed from service</option>
          </select>
          <input type="text" x-model="movedBy" placeholder="Your name">
          <!-- Note + photo share a row, same glove-sized pattern as the
               meter capture. The photo is optional but nagged for on
               fail/removed — see logInspection(). -->
          <div class="meter-row">
            <input type="text" x-model="inspNote"
                   placeholder="Note — what you saw (optional)">
            <button type="button" class="cam" :class="{ has: inspPhoto }"
                    @click="$refs.inspPhotoInput.click()"
                    :aria-label="inspPhoto ? 'Photo attached' : 'Photo of the condition'"
                    x-text="inspPhoto ? '📷✓' : '📷'"></button>
            <input type="file" accept="image/*" capture="environment" hidden
                   x-ref="inspPhotoInput"
                   @change="inspPhoto = $event.target.files[0] || null">
          </div>
          <button class="go secondary" :disabled="!inspResult || busy"
                  @click="logInspection()"
                  x-text="busy ? 'Saving…' : 'Log inspection'"></button>
          <div class="flash" x-show="inspFlash" x-text="inspFlash"></div>
          <div class="error" x-show="inspError" x-text="inspError"></div>

          <template x-if="inspections.length">
            <div>
              <h2>Inspection history</h2>
              <template x-for="i in inspections" :key="i.id">
                <div class="rdg">
                  <span class="val" :class="'res-' + i.result" x-text="resultLabel(i.result)"></span>
                  <span x-text="reqLabel(i)"></span>
                  <span class="who"
                        x-text="fmtIDay(i.inspected_at) + (i.inspected_by && i.inspected_by !== 'unspecified' ? ' · ' + i.inspected_by : '')"></span>
                  <span class="who" x-show="i.note" x-text="i.note"></span>
                  <a x-show="i.photo" :href="inspPhotoUrl(i)" target="_blank">photo</a>
                </div>
              </template>
            </div>
          </template>

          <!-- Manage requirements: catalog data, manager-facing. Common
               templates live in docs/inspection-seeds.md — intervals must
               come from YOUR safety program, not from examples. -->
          <div style="margin-top:14px">
            <template x-if="!showReqForm">
              <button class="resv-toggle" @click="showReqForm = true">⚙ Manage requirements →</button>
            </template>
            <template x-if="showReqForm">
              <div>
                <h2 x-text="reqEditing ? 'Edit requirement' : 'Add a requirement'"></h2>
                <template x-for="r in requirements" :key="r.id">
                  <div class="insp-row">
                    <strong x-text="r.name"></strong> —
                    every <span x-text="r.interval_days"></span> days
                    <button class="resv-cancel" style="display:inline; margin:0 0 0 8px"
                            @click="editReq(r)">edit</button>
                  </div>
                </template>
                <div style="margin-top:10px">
                  <input type="text" x-model="reqName"
                         placeholder="Name — e.g. Monthly visual">
                  <input type="number" inputmode="numeric" min="1" step="1"
                         x-model="reqInterval"
                         placeholder="Interval in days — e.g. 30"
                         aria-label="Interval in days">
                  <input type="text" x-model="reqRef"
                         placeholder="Reference — reg / manual / SOP (optional)">
                  <button class="go secondary"
                          :disabled="!reqName || !(Number(reqInterval) >= 1) || busy"
                          @click="saveRequirement()"
                          x-text="busy ? 'Saving…' : (reqEditing ? 'Save changes' : 'Add requirement')"></button>
                  <button class="resv-cancel" x-show="reqEditing"
                          @click="reqEditing = null; reqName = ''; reqInterval = ''; reqRef = ''">
                    Cancel edit</button>
                  <div class="flash" x-show="reqFlash" x-text="reqFlash"></div>
                  <div class="error" x-show="reqError" x-text="reqError"></div>
                </div>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- Open reservations: the "who has it next" answer. Shown before
           the move button so a crew grabbing this thing sees the claim
           before they haul it off. Multiple claims = the queue, soonest
           first — people negotiate, TrenchNote just shows them who to
           call. Claims stay visible until fulfilled or cancelled; an open
           claim past its release date turns red instead of vanishing. -->
      <template x-for="r in activeReservations" :key="r.id">
        <div class="resv-note" :class="{ expired: isExpired(r) }">
          <strong x-text="isExpired(r) ? 'Spoken for — release date passed' : 'Spoken for'"></strong> —
          needed by <span x-text="fmtDate(r.needed_by)"></span>
          · <span x-text="r.requested_by || 'unspecified'"></span>
          <span x-show="r.expected_release"
                x-text="' (through ' + fmtDate(r.expected_release) + ')'"></span>
          <span x-show="r.note" x-text="' — ' + r.note"></span>
          <button class="resv-cancel" @click="cancelClaim(r)">Cancel this claim</button>
        </div>
      </template>

      <!-- Move action -->
      <div class="move">
        <h2>Move this asset</h2>
        <select x-model="moveTo" aria-label="Destination">
          <option value="" disabled selected>Choose destination…</option>
          <template x-for="loc in destinations" :key="loc.id">
            <option :value="loc.id" x-text="loc.name"></option>
          </template>
        </select>
        <input type="text" x-model="movedBy" placeholder="Your name (optional)">

        <!-- Optional meter reading at the scan moment (ADR 0012). Shown
             only when the item catalog says this kind of thing has a
             gauge (items.meter). Leaving it blank changes nothing about
             the move — same taps, same request, same result. -->
        <template x-if="meterType">
          <div class="meter-row">
            <input type="number" inputmode="decimal" min="0" step="any"
                   x-model="readingValue"
                   :placeholder="meterLabel + ' reading? (optional)'"
                   :aria-label="meterLabel + ' reading (optional)'">
            <button type="button" class="cam" :class="{ has: readingPhoto }"
                    @click="$refs.gaugePhoto.click()"
                    :aria-label="readingPhoto ? 'Gauge photo attached' : 'Photo of the gauge'"
                    x-text="readingPhoto ? '📷✓' : '📷'"></button>
            <input type="file" accept="image/*" capture="environment" hidden
                   x-ref="gaugePhoto"
                   @change="readingPhoto = $event.target.files[0] || null">
          </div>
        </template>

        <button class="go" :disabled="!moveTo || busy" @click="move()"
                x-text="busy ? 'Saving…' : 'Move here'"></button>

        <div class="flash" x-show="flash" x-text="flash"></div>
        <div class="error" x-show="moveError" x-text="moveError"></div>
        <!-- Reading outcome is separate from the move outcome: the move
             already succeeded by the time this can appear. -->
        <div class="warn" x-show="readingNote" x-text="readingNote"></div>

        <!-- After a move, offer to close out open claims. No guesswork:
             the person who just handed it over says which claim this
             satisfied. -->
        <template x-if="showFulfill && activeReservations.length">
          <div class="fulfill">
            <p>Did this move hand it over?</p>
            <template x-for="r in activeReservations" :key="r.id">
              <button @click="fulfillClaim(r)"
                      x-text="'✓ Yes — mark ' + (r.requested_by || 'this claim') +
                              ' (needed by ' + fmtDate(r.needed_by) + ') fulfilled'"></button>
            </template>
          </div>
        </template>
      </div>

      <!-- Meter readings (ADR 0012): derived latest-first history plus a
           standalone record action for month-end walkdowns that don't
           involve a move. A reading lower than its predecessor is legal
           (replaced meter / typo) and FLAGGED at render time by comparing
           neighbors — visibility, never a block. -->
      <template x-if="meterType">
        <div class="meter">
          <h2 x-text="meterLabel + ' readings'"></h2>
          <template x-for="(r, i) in readings" :key="r.id">
            <div class="rdg">
              <span class="val" x-text="fmtVal(r.value)"></span>
              <span class="low" x-show="isLow(i)">lower than previous</span>
              <span class="who"
                    x-text="fmtWhen(r.created) + (r.recorded_by && r.recorded_by !== 'unspecified' ? ' · ' + r.recorded_by : '')"></span>
              <a x-show="r.photo" :href="gaugeUrl(r)" target="_blank">gauge photo</a>
            </div>
          </template>
          <p class="meta" x-show="!readings.length" style="margin-bottom:10px">No readings yet.</p>

          <template x-if="!showRecord">
            <button class="resv-toggle" @click="showRecord = true"
                    style="margin-top:10px">➕ Record a reading (no move) →</button>
          </template>
          <template x-if="showRecord">
            <div style="margin-top:10px">
              <div class="meter-row">
                <input type="number" inputmode="decimal" min="0" step="any"
                       x-model="soloValue"
                       :placeholder="meterLabel + ' reading'"
                       :aria-label="meterLabel + ' reading'">
                <button type="button" class="cam" :class="{ has: soloPhoto }"
                        @click="$refs.soloGauge.click()"
                        :aria-label="soloPhoto ? 'Gauge photo attached' : 'Photo of the gauge'"
                        x-text="soloPhoto ? '📷✓' : '📷'"></button>
                <input type="file" accept="image/*" capture="environment" hidden
                       x-ref="soloGauge"
                       @change="soloPhoto = $event.target.files[0] || null">
              </div>
              <input type="text" x-model="movedBy" placeholder="Your name (optional)">
              <button class="go secondary" :disabled="!(Number(soloValue) > 0) || busy"
                      @click="recordReading()"
                      x-text="busy ? 'Saving…' : 'Save reading'"></button>
              <div class="flash" x-show="soloFlash" x-text="soloFlash"></div>
              <div class="warn" x-show="soloNote" x-text="soloNote"></div>
            </div>
          </template>
        </div>
      </template>

      <!-- Reserve: collapsed by default to keep the scan page focused
           on the two field questions (where is it / move it) -->
      <div class="resv">
        <template x-if="!showReserve">
          <button class="resv-toggle" @click="showReserve = true">
            Need this later? Reserve it →
          </button>
        </template>
        <template x-if="showReserve">
          <div>
            <h2>Reserve this asset</h2>
            <input type="text" x-model="resvBy" placeholder="Your name">
            <label class="field-label" for="neededBy">Needed by</label>
            <input id="neededBy" type="date" x-model="resvNeeded">
            <label class="field-label" for="expRelease">Expected release (optional)</label>
            <input id="expRelease" type="date" x-model="resvRelease">
            <input type="text" x-model="resvNote" placeholder="Note — what it's for (optional)">
            <button class="go secondary" :disabled="!resvNeeded || !resvBy || busy"
                    @click="reserve()" x-text="busy ? 'Saving…' : 'Reserve'"></button>
            <div class="flash" x-show="resvFlash" x-text="resvFlash"></div>
            <div class="error" x-show="resvError" x-text="resvError"></div>
          </div>
        </template>
      </div>

      <!-- The "scanning a second tag while already in the app" path -->
      <div class="resv">
        <a class="resv-toggle" style="text-decoration:underline" href="scan.html">📷 Scan another tag</a>
      </div>
    </main>
  </template>

</div>

<script>
TN.requireLogin();

function assetPage() {
  // PocketBase serves this page from pb_public/, so the API lives at
  // the same origin. This is why no base-URL config is needed —
  // it works on localhost AND when your phone hits the LAN IP.
  const PB = window.location.origin;

  return {
    code: new URLSearchParams(location.search).get('code') || '',
    state: 'loading',
    errorMsg: '',
    asset: null,
    locations: [],
    daysHere: null,
    moveTo: '',
    // Remember the mover's name on this phone so crews type it once.
    movedBy: localStorage.getItem('tn_name') || '',
    busy: false,
    flash: '',
    moveError: '',
    reservations: [],
    // Meter readings (ADR 0012). readingValue/-Photo ride along with the
    // move; soloValue/-Photo belong to the standalone month-end record.
    readings: [],
    readingValue: '',
    readingPhoto: null,
    readingNote: '',
    showRecord: false,
    soloValue: '',
    soloPhoto: null,
    soloFlash: '',
    soloNote: '',
    // Inspections (ADR 0014). The badge itself is the `insp` getter —
    // derived, never held in state.
    requirements: [],
    inspections: [],
    showInsp: false,
    inspReq: '',        // requirement id, '' = ad-hoc
    inspResult: '',
    inspNote: '',
    inspPhoto: null,
    inspFlash: '',
    inspError: '',
    showReqForm: false,
    reqEditing: null,   // requirement id being edited, null = adding
    reqName: '',
    reqInterval: '',
    reqRef: '',
    reqFlash: '',
    reqError: '',
    showReserve: false,
    showFulfill: false,
    resvBy: localStorage.getItem('tn_name') || '',
    resvNeeded: '',
    resvRelease: '',
    resvNote: '',
    resvFlash: '',
    resvError: '',

    // Destinations = every location except the current one
    get destinations() {
      return this.locations.filter(l => l.id !== this.asset?.current_location);
    },

    // Whether this KIND of thing has a gauge comes from the catalog
    // (items.meter, ADR 0012) — already expanded in the asset fetch, so
    // deciding whether to show the reading field costs zero requests.
    get meterType() {
      return this.asset?.expand?.item?.meter || '';
    },
    get meterLabel() {
      return this.meterType === 'odometer' ? 'Odometer' : 'Hour meter';
    },

    // The lower-than-previous flag is DERIVED at render time by comparing
    // neighbors (readings arrive newest-first). Never stored: a stored
    // flag could disagree with the records it summarizes.
    isLow(i) {
      const next = this.readings[i + 1];
      return !!next && this.readings[i].value < next.value;
    },

    fmtVal(v) {
      return Number(v).toLocaleString();
    },

    fmtWhen(pbDate) {
      return new Date(pbDate).toLocaleDateString(undefined,
        { month: 'short', day: 'numeric' });
    },

    gaugeUrl(r) {
      // PocketBase file URL pattern: /api/files/{collection}/{recordId}/{filename}
      return `${PB}/api/files/readings/${r.id}/${r.photo}`;
    },

    // A claim is active until a human closes it (fulfilled or cancelled).
    // Empty status = rows from before the status field existed = open.
    // Date-based hiding was deliberately removed (ADR 0007): a stale open
    // claim is an unresolved question, so it stays visible — flagged red
    // once its release date passes (see isExpired).
    get activeReservations() {
      return this.reservations.filter(r =>
        r.status !== 'fulfilled' && r.status !== 'cancelled'
      );
    },

    isExpired(r) {
      // ISO-ish strings compare correctly as strings; equal-day is not
      // yet expired (you have until the end of the release day).
      const today = new Date().toISOString().slice(0, 10);
      return !!r.expected_release && r.expected_release < today;
    },

    fmtDate(pbDate) {
      // Dates are stored date-only at UTC midnight ("2026-07-14 00:00:00Z").
      // Format in UTC too, or western timezones would show the day before.
      return new Date(pbDate).toLocaleDateString(undefined,
        { month: 'short', day: 'numeric', timeZone: 'UTC' });
    },

    get photoUrl() {
      const item = this.asset?.expand?.item;
      if (!item || !item.photo) return null;
      // PocketBase file URL pattern: /api/files/{collection}/{recordId}/{filename}
      return `${PB}/api/files/items/${item.id}/${item.photo}`;
    },

    async load() {
      if (!this.code) {
        this.state = 'error';
        this.errorMsg = 'No tag code in the URL. Open this page as asset.html?code=A001';
        return;
      }
      try {
        // 1. Find the asset by its tag code. `filter` is PocketBase's query
        //    syntax; `expand=item,current_location` pulls the related item
        //    and location records in the same request (they arrive under
        //    asset.expand.*), saving two round-trips on a slow connection.
        const filter = encodeURIComponent(`tag_code='${this.code.replace(/'/g, "\\'")}'`);
        const res = await TN.fetch(
          `${PB}/api/collections/assets/records?filter=(${filter})&expand=item,current_location&perPage=1`
        );
        if (!res.ok) throw new Error(`API error ${res.status}`);
        const data = await res.json();
        if (!data.items.length) {
          this.state = 'error';
          this.errorMsg = `No asset found with tag "${this.code}". Check the code, or add it in the admin UI.`;
          return;
        }
        this.asset = data.items[0];

        // 2. Load all locations for the destination dropdown.
        const locRes = await TN.fetch(`${PB}/api/collections/locations/records?sort=name&perPage=200`);
        this.locations = (await locRes.json()).items;

        // 3. "How long has it been here" comes from the ledger: time since
        //    this asset's latest movement (sort=-created, take one). Falls
        //    back to the asset record's created date if it has never moved.
        const mvFilter = encodeURIComponent(`asset='${this.asset.id}'`);
        const mvRes = await TN.fetch(
          `${PB}/api/collections/movements/records?filter=(${mvFilter})&sort=-created&perPage=1`
        );
        const mv = (await mvRes.json()).items[0];
        const since = new Date(mv ? mv.created : this.asset.created);
        this.daysHere = Math.floor((Date.now() - since) / 86400000);

        // 4. Reservations on this asset, soonest first. Past ones are
        //    filtered out client-side (see upcomingReservations).
        const rFilter = encodeURIComponent(`asset='${this.asset.id}'`);
        const rRes = await TN.fetch(
          `${PB}/api/collections/reservations/records?filter=(${rFilter})&sort=needed_by&perPage=20`
        );
        this.reservations = (await rRes.json()).items;

        // 5. Meter readings, newest first — ONLY for metered items, so
        //    unmetered gear (most of it) pays nothing for the feature.
        //    Six records: the latest plus enough history to render the
        //    lower-than-previous flags meaningfully.
        if (this.meterType) {
          const rdFilter = encodeURIComponent(`asset='${this.asset.id}'`);
          const rdRes = await TN.fetch(
            `${PB}/api/collections/readings/records?filter=(${rdFilter})&sort=-created&perPage=6`
          );
          this.readings = (await rdRes.json()).items;
        }

        // 6. Inspections (ADR 0014): the asset's requirements and its
        //    inspection ledger, fetched together — both are needed for
        //    the derived badge (an ad-hoc removed-from-service blocks
        //    use even on an asset with zero requirements).
        const iqFilter = encodeURIComponent(`asset='${this.asset.id}'`);
        const [reqRes, inspRes] = await Promise.all([
          TN.fetch(`${PB}/api/collections/inspection_requirements/records?filter=(${iqFilter})&sort=name&perPage=100`),
          // Newest-first by the day eyes were on the thing; `created`
          // breaks same-day ties (the fail, then the re-check).
          TN.fetch(`${PB}/api/collections/inspections/records?filter=(${iqFilter})&sort=-inspected_at,-created&perPage=100`),
        ]);
        if (!reqRes.ok || !inspRes.ok) throw new Error('API error ' + (reqRes.ok ? inspRes.status : reqRes.status));
        this.requirements = (await reqRes.json()).items;
        this.inspections = (await inspRes.json()).items;

        this.state = 'ready';
      } catch (err) {
        this.state = 'error';
        this.errorMsg = 'Could not reach the server. Is PocketBase running? (' + err.message + ')';
      }
    },

    async move() {
      this.busy = true;
      this.flash = '';
      this.moveError = '';
      this.readingNote = '';
      if (this.movedBy) localStorage.setItem('tn_name', this.movedBy);

      const dest = this.locations.find(l => l.id === this.moveTo);
      // The movement body is built once, WITH a pre-generated id, so the
      // same record can be sent now or replayed from the offline queue —
      // a duplicate id is rejected by the server, which makes retries
      // safe (ADR 0008).
      const movement = {
        id: TNSync.genId(),
        asset: this.asset.id,
        from_location: this.asset.current_location || null,
        to_location: this.moveTo,
        moved_by: this.movedBy || 'unspecified'
      };

      try {
        // THE ORDER HERE MATTERS.
        // 1. Write the ledger entry first — movements are the source of
        //    truth. If the second request fails we have a true ledger and a
        //    stale cache (visible, fixable); the other order could lose the
        //    move entirely.
        const mvRes = await TN.fetch(`${PB}/api/collections/movements/records`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(movement)
        });
        if (!mvRes.ok) throw new Error('movement rejected (' + mvRes.status + ')');

        // 2. Then update the asset's cached current_location.
        const upRes = await TN.fetch(`${PB}/api/collections/assets/records/${this.asset.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ current_location: this.moveTo })
        });
        if (!upRes.ok) throw new Error('asset update rejected (' + upRes.status + ')');

        this.flash = '✓ Moved to ' + (dest ? dest.name : 'new location');
        this.moveTo = '';
        this.showFulfill = true;   // offer to close out open claims below

        // The move is already committed — the optional reading is a
        // separate best-effort write with its own outcome line. A reading
        // problem can never un-succeed the move.
        if (this.readingValue !== '') {
          const r = await this.submitReading(Number(this.readingValue), this.readingPhoto);
          if (r.ok) this.flash += r.queued ? ' · reading saved on this phone' : ' · reading saved';
          this.readingNote = r.warn;
          if (r.ok) { this.readingValue = ''; this.readingPhoto = null; }
        }

        await this.load();   // refresh the plate
      } catch (err) {
        if (TNSync.isNetworkError(err)) {
          // No signal. Queue the whole move (ledger write + cache patch)
          // and show the phone's view as if it landed — the badge makes
          // the pending state visible until it syncs.
          await TNSync.enqueue(movement,
            { assetId: this.asset.id, toLocation: this.moveTo },
            this.code + ' → ' + (dest ? dest.name : 'destination'));
          this.asset.current_location = this.moveTo;
          if (this.asset.expand) this.asset.expand.current_location = dest;
          this.daysHere = 0;
          this.flash = '✓ Saved on this phone — will sync when signal returns';
          this.moveTo = '';
          // The reading queues right behind its movement (FIFO), photo
          // and all — IndexedDB stores the file as a Blob.
          if (this.readingValue !== '' && Number(this.readingValue) > 0) {
            await TNSync.enqueueReading(
              this.buildReadingBody(Number(this.readingValue)), this.readingPhoto,
              this.code + ' ' + this.meterLabel.toLowerCase() + ' ' + this.readingValue);
            this.flash += ' (move + reading)';
            this.readingValue = '';
            this.readingPhoto = null;
          }
        } else {
          this.moveError = 'Move failed: ' + err.message +
            '. Check the API rules on "movements" (Create) and "assets" (Update).';
        }
      } finally {
        this.busy = false;
      }
    },

    // Reading bodies get a pre-generated id like movements do, so the
    // same body can be sent now or replayed from the offline queue
    // without ever doubling a ledger entry (ADR 0008 pattern).
    buildReadingBody(v) {
      return {
        id: TNSync.genId(),
        asset: this.asset.id,
        value: v,
        // Copied from items.meter at capture time so the record stays
        // self-contained even if the catalog is re-flagged later.
        reading_type: this.meterType,
        recorded_by: this.movedBy || 'unspecified'
      };
    },

    // Shared by the move flow and the standalone record button.
    // Returns { ok, queued, warn }: ok = persisted or safely queued;
    // warn = the amber heads-up line (lower-than-previous, or why the
    // reading didn't save). Never throws.
    async submitReading(v, photo) {
      if (!(v > 0)) {
        return { ok: false, queued: false,
                 warn: '⚠ Reading not saved — enter the number on the gauge (greater than zero).' };
      }
      const prev = this.readings[0];   // newest-first
      const body = this.buildReadingBody(v);
      // Lower than the last reading: legal (meters get replaced, typos
      // happen more) — save it anyway, flag it, never block.
      const lowWarn = prev && v < prev.value
        ? '⚠ Heads-up: ' + this.fmtVal(v) + ' is LOWER than the last reading (' +
          this.fmtVal(prev.value) + '). It saved and is flagged in the history — ' +
          'if it was a typo, enter a corrected reading.'
        : '';
      try {
        // Multipart instead of JSON because the gauge photo rides along;
        // PocketBase casts the string form values to the schema types.
        const fd = new FormData();
        for (const k in body) fd.append(k, body[k]);
        if (photo) fd.append('photo', photo, 'gauge.jpg');
        const res = await TN.fetch(`${PB}/api/collections/readings/records`, {
          method: 'POST',
          body: fd
        });
        if (!res.ok) throw new Error('reading rejected (' + res.status + ')');
        return { ok: true, queued: false, warn: lowWarn };
      } catch (err) {
        if (TNSync.isNetworkError(err)) {
          await TNSync.enqueueReading(body, photo,
            this.code + ' ' + this.meterLabel.toLowerCase() + ' ' + this.fmtVal(v));
          return { ok: true, queued: true, warn: lowWarn };
        }
        return { ok: false, queued: false,
                 warn: '⚠ Reading NOT saved: ' + err.message };
      }
    },

    // Standalone reading for month-end walkdowns — no move involved.
    async recordReading() {
      this.busy = true;
      this.soloFlash = '';
      this.soloNote = '';
      if (this.movedBy) localStorage.setItem('tn_name', this.movedBy);
      const r = await this.submitReading(Number(this.soloValue), this.soloPhoto);
      this.soloNote = r.warn;
      if (r.ok) {
        this.soloFlash = r.queued
          ? '✓ Saved on this phone — will sync when signal returns'
          : '✓ Reading saved';
        this.soloValue = '';
        this.soloPhoto = null;
        if (!r.queued) await this.load();   // show it in the history above
      }
      this.busy = false;
    },

    // ---- Inspections (ADR 0014) -----------------------------------

    // The whole compliance verdict, recomputed from the two fetched
    // lists on every render. tn-inspect.js is the single implementation
    // this page and the dashboard both trust — see the file header for
    // the RED/YELLOW/GREEN rules.
    get insp() {
      return TNInspect.assess(this.requirements, this.inspections);
    },

    chipClass(state) {
      return { failed: 'red', never: 'red', overdue: 'red',
               due_soon: 'amber', ok: 'ok' }[state] || '';
    },

    fmtIDay(d) { return TNInspect.fmtDay(d); },

    resultLabel(res) {
      return res === 'pass' ? '✓ PASS'
           : res === 'fail' ? '✗ FAIL' : '🚫 REMOVED';
    },

    // Requirement name for a history row. Requirements can be renamed
    // or (admin-only) deleted after the fact — the ledger row survives
    // either way, so fall back gracefully.
    reqLabel(i) {
      if (!i.requirement) return 'ad-hoc';
      const r = this.requirements.find((x) => x.id === i.requirement);
      return r ? r.name : '(removed requirement)';
    },

    inspPhotoUrl(i) {
      // PocketBase file URL pattern: /api/files/{collection}/{recordId}/{filename}
      return `${PB}/api/files/inspections/${i.id}/${i.photo}`;
    },

    async logInspection() {
      if (!this.inspResult) return;
      // The loud photo nag: a fail/removed without a photo is legal —
      // a missing camera must never stop someone pulling unsafe gear
      // from service — but it costs one confirm, because the photo of
      // the defect is the record that ends arguments later.
      if (this.inspResult !== 'pass' && !this.inspPhoto) {
        const what = this.inspResult === 'fail' ? 'a FAIL' : 'REMOVED FROM SERVICE';
        if (!confirm('Logging ' + what + ' without a photo.\n\n' +
                     'A photo of the problem is the evidence that settles it later.\n\n' +
                     'OK = log without a photo. Cancel = go back and add one.')) return;
      }
      this.busy = true;
      this.inspFlash = '';
      this.inspError = '';
      if (this.movedBy) localStorage.setItem('tn_name', this.movedBy);

      // inspected_at is CLIENT-SET, date-only at UTC midnight (the
      // reservations convention): the due-date math keys on the day the
      // eyes were on the thing, and that day must survive an offline
      // queue — a Friday inspection syncing Monday still reads Friday.
      // Pre-generated id, same as movements: offline replay is idempotent.
      const body = {
        id: TNSync.genId(),
        asset: this.asset.id,
        requirement: this.inspReq || '',
        result: this.inspResult,
        inspected_by: this.movedBy || 'unspecified',
        inspected_at: new Date().toISOString().slice(0, 10) + ' 00:00:00',
        note: this.inspNote || '',
      };
      const label = this.code + ' inspection: ' + this.inspResult;
      try {
        // Multipart like readings — the photo rides along and PocketBase
        // casts the string form values to the schema types.
        const fd = new FormData();
        for (const k in body) fd.append(k, body[k]);
        if (this.inspPhoto) fd.append('photo', this.inspPhoto, 'inspection.jpg');
        const res = await TN.fetch(`${PB}/api/collections/inspections/records`, {
          method: 'POST',
          body: fd,
        });
        if (!res.ok) throw new Error('inspection rejected (' + res.status + ')');
        this.inspFlash = '✓ Inspection logged';
        this.clearInspForm();
        await this.load();
        this.showInsp = true;   // load() doesn't touch it, but keep the panel open explicitly
      } catch (err) {
        if (TNSync.isNetworkError(err)) {
          await TNSync.enqueueInspection(body, this.inspPhoto, label);
          // Show this phone's verdict now: the badge must flip red the
          // moment a fail is logged, signal or not. The server copy
          // lands at sync under the same id.
          this.inspections.unshift(
            Object.assign({ created: new Date().toISOString(), photo: '' }, body));
          this.inspFlash = '✓ Saved on this phone — will sync when signal returns';
          this.clearInspForm();
        } else {
          this.inspError = 'Inspection did not save: ' + err.message;
        }
      } finally {
        this.busy = false;
      }
    },

    clearInspForm() {
      this.inspReq = '';
      this.inspResult = '';
      this.inspNote = '';
      this.inspPhoto = null;
    },

    // Requirements are catalog data (manager-edited), not a ledger:
    // plain create/update, deliberately NOT offline-queued — changing
    // the safety program is office work done with connectivity, not a
    // dirt-lot write that must never be lost.
    async saveRequirement() {
      if (!this.reqName || !(Number(this.reqInterval) >= 1)) return;
      this.busy = true;
      this.reqFlash = '';
      this.reqError = '';
      const body = {
        asset: this.asset.id,
        name: this.reqName,
        interval_days: Math.round(Number(this.reqInterval)),
        reference: this.reqRef || '',
      };
      try {
        const res = await TN.fetch(
          this.reqEditing
            ? `${PB}/api/collections/inspection_requirements/records/${this.reqEditing}`
            : `${PB}/api/collections/inspection_requirements/records`,
          {
            method: this.reqEditing ? 'PATCH' : 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
        if (!res.ok) throw new Error('rejected (' + res.status + ')');
        this.reqFlash = this.reqEditing ? '✓ Requirement updated' : '✓ Requirement added';
        this.reqEditing = null;
        this.reqName = '';
        this.reqInterval = '';
        this.reqRef = '';
        await this.load();
        this.showInsp = true;
      } catch (err) {
        this.reqError = 'Could not save the requirement: ' + err.message;
      } finally {
        this.busy = false;
      }
    },

    editReq(r) {
      this.reqEditing = r.id;
      this.reqName = r.name;
      this.reqInterval = r.interval_days;
      this.reqRef = r.reference || '';
    },

    async reserve() {
      this.busy = true;
      this.resvFlash = '';
      this.resvError = '';
      if (this.resvBy) localStorage.setItem('tn_name', this.resvBy);
      try {
        // Date inputs give "2026-07-14"; PocketBase date fields accept
        // that with a time appended.
        const res = await TN.fetch(`${PB}/api/collections/reservations/records`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            asset: this.asset.id,
            requested_by: this.resvBy,
            needed_by: this.resvNeeded + ' 00:00:00',
            expected_release: this.resvRelease ? this.resvRelease + ' 00:00:00' : null,
            note: this.resvNote || '',
            status: 'open'
          })
        });
        if (!res.ok) throw new Error('reservation rejected (' + res.status + ')');
        this.resvFlash = '✓ Reserved — needed by ' + this.fmtDate(this.resvNeeded);
        this.resvNeeded = '';
        this.resvRelease = '';
        this.resvNote = '';
        await this.load();   // show the new claim in the list above
      } catch (err) {
        this.resvError = 'Reservation failed: ' + err.message;
      } finally {
        this.busy = false;
      }
    },

    // Close out a claim. Fulfilled/cancelled claims leave the pages but
    // stay in the database — demand history is worth keeping.
    async setStatus(r, status) {
      const res = await TN.fetch(`${PB}/api/collections/reservations/records/${r.id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      if (!res.ok) {
        this.moveError = 'Could not update the claim (' + res.status + ')';
        return;
      }
      this.flash = status === 'fulfilled' ? '✓ Claim marked fulfilled' : '✓ Claim cancelled';
      await this.load();
    },

    async fulfillClaim(r) {
      await this.setStatus(r, 'fulfilled');
    },

    cancelClaim(r) {
      // One confirm — cancelling someone else's claim is a phone call
      // you should have made first.
      const who = r.requested_by || 'someone';
      if (confirm('Cancel ' + who + "'s claim (needed by " +
                  this.fmtDate(r.needed_by) + ')? They will not be notified.')) {
        this.setStatus(r, 'cancelled');
      }
    }
  };
}
</script>
